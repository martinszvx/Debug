<!DOCTYPE html>

<!-- O problema estava no calculo onde estava fazendo a divisão primeiro que a soma total de todas as notas-->
 <!-- ANTES -->
    <script>
        function verificarAprovacao(n1,n2,n3){
            let media = n1 + n2 + n3 / 3;
            if(media >= 7 ) {
                return "Aprovado com média: " + media;
            }
            else{
                return "Reprovado com média: " + media;
            }
        }
    </script>

 <!-- DEPOIS -->
    <script>
        function verificarAprovacao(n1,n2,n3){
            let media = (n1 + n2 + n3) / 3;
            if(media >= 7 ) {
                return "Aprovado com média: " + media;
            }
            else{
                return "Reprovado com média: " + media;
            }
        }
    </script>
</body>
